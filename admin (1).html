<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MB Studio — Admin Panel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a1a1a;color:#e0e0e0;font-family:Arial,sans-serif;padding:20px;}
.container{max-width:1200px;margin:0 auto;}
h1{margin-bottom:30px;color:#fff;}
.tabs{display:flex;gap:10px;margin-bottom:20px;border-bottom:1px solid #333;}
.tab-btn{padding:10px 20px;background:none;border:none;color:#888;cursor:pointer;font-size:14px;}
.tab-btn.active{color:#fff;border-bottom:2px solid #fff;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.form-group{margin-bottom:15px;}
label{display:block;margin-bottom:5px;font-size:12px;text-transform:uppercase;color:#aaa;}
input,textarea,select{width:100%;padding:10px;background:#222;border:1px solid #444;color:#e0e0e0;font-size:14px;}
textarea{resize:vertical;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
button{padding:10px 20px;background:#fff;color:#000;border:none;cursor:pointer;font-weight:bold;margin-right:10px;margin-top:10px;}
button:hover{background:#ddd;}
.btn-danger{background:#ff4444;color:#fff;}
.btn-danger:hover{background:#cc0000;}
.product-list{margin-top:20px;}
.product-item{background:#222;padding:15px;margin-bottom:10px;border:1px solid #333;border-radius:5px;}
.product-item h3{margin-bottom:10px;}
.product-item-info{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;font-size:12px;margin-bottom:10px;}
.product-item-actions{display:flex;gap:10px;}
.btn-small{padding:5px 10px;font-size:12px;}
.checkbox-group{display:flex;gap:20px;margin-top:10px;}
.checkbox-group label{margin-bottom:0;display:flex;align-items:center;gap:5px;}
input[type="checkbox"]{width:auto;}
.success{color:#4afa4a;}
.error{color:#ff4444;}
.message{padding:10px;margin-bottom:10px;border-radius:3px;}
</style>
</head>
<body>

<div class="container">
  <h1>MB Studio — Admin Panel</h1>
  
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('products')">Products</button>
    <button class="tab-btn" onclick="switchTab('media')">Media</button>
  </div>

  <div id="products" class="tab-content active">
    <h2>Manage Products</h2>
    <div id="productMessage"></div>
    
    <form id="productForm" onsubmit="saveProduct(event)">
      <h3>Add/Edit Product</h3>
      <input id="p_id" type="hidden"/>
      
      <div class="form-row">
        <div class="form-group">
          <label>Product Name *</label>
          <input id="p_name" type="text" required/>
        </div>
        <div class="form-group">
          <label>Category *</label>
          <select id="p_category" required>
            <option>canvas</option>
            <option>digital</option>
            <option>jewellery</option>
            <option>accessories</option>
            <option>books</option>
            <option>curios</option>
            <option>atelier</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Price (INR)</label>
          <input id="p_price" type="number"/>
        </div>
        <div class="form-group">
          <label>Year</label>
          <input id="p_year" type="text"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Size</label>
          <input id="p_size" type="text"/>
        </div>
        <div class="form-group">
          <label>Edition</label>
          <input id="p_edition" type="text"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Collection</label>
          <input id="p_collection" type="text"/>
        </div>
        <div class="form-group">
          <label>Tag</label>
          <select id="p_tag">
            <option>product</option>
            <option>menu</option>
            <option>homepage</option>
            <option>gallery</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea id="p_desc"></textarea>
      </div>

      <div class="form-group">
        <label>Image URL 1 (Main) *</label>
        <input id="p_image1" type="url" required/>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Image URL 2</label>
          <input id="p_image2" type="url"/>
        </div>
        <div class="form-group">
          <label>Image URL 3</label>
          <input id="p_image3" type="url"/>
        </div>
      </div>

      <div class="form-group">
        <label>Image URL 4</label>
        <input id="p_image4" type="url"/>
      </div>

      <div class="checkbox-group">
        <label><input id="p_sold" type="checkbox"/> Sold</label>
      </div>

      <button type="submit">Save Product</button>
      <button type="button" onclick="clearProductForm()">Clear</button>
    </form>

    <div class="product-list" id="productList"></div>
  </div>

  <div id="media" class="tab-content">
    <h2>Manage Media</h2>
    <div id="mediaMessage"></div>
    
    <form id="mediaForm" onsubmit="saveMediaItem(event)">
      <h3>Add/Edit Media</h3>
      <input id="m_id" type="hidden"/>
      
      <div class="form-row">
        <div class="form-group">
          <label>Tag *</label>
          <select id="m_tag" required>
            <option>homepage</option>
            <option>menu</option>
            <option>about</option>
          </select>
        </div>
        <div class="form-group">
          <label>Media URL *</label>
          <input id="m_url" type="url" required/>
        </div>
      </div>

      <div class="form-group">
        <label>Caption</label>
        <input id="m_caption" type="text"/>
      </div>

      <button type="submit">Save Media</button>
      <button type="button" onclick="clearMediaForm()">Clear</button>
    </form>

    <div class="product-list" id="mediaList"></div>
  </div>
</div>

<script>
const DB_NAME = 'MB_Studio';
const PRODUCTS_STORE = 'products';
const MEDIA_STORE = 'media';
let db;

// Initialize IndexedDB
function initDB(){
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, 1);
    
    request.onerror = () => reject(request.error);
    request.onsuccess = () => {
      db = request.result;
      resolve(db);
    };
    
    request.onupgradeneeded = (e) => {
      const database = e.target.result;
      if(!database.objectStoreNames.contains(PRODUCTS_STORE)) {
        database.createObjectStore(PRODUCTS_STORE, {keyPath: 'id'});
      }
      if(!database.objectStoreNames.contains(MEDIA_STORE)) {
        database.createObjectStore(MEDIA_STORE, {keyPath: 'id'});
      }
    };
  });
}

async function getProducts(){
  await initDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(PRODUCTS_STORE, 'readonly');
    const store = tx.objectStore(PRODUCTS_STORE);
    const request = store.getAll();
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function getMedia(){
  await initDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(MEDIA_STORE, 'readonly');
    const store = tx.objectStore(MEDIA_STORE);
    const request = store.getAll();
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function saveProduct(product){
  await initDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(PRODUCTS_STORE, 'readwrite');
    const store = tx.objectStore(PRODUCTS_STORE);
    const request = store.put(product);
    request.onsuccess = () => resolve();
    request.onerror = () => reject(request.error);
  });
}

async function saveMediaItem(media){
  await initDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(MEDIA_STORE, 'readwrite');
    const store = tx.objectStore(MEDIA_STORE);
    const request = store.put(media);
    request.onsuccess = () => resolve();
    request.onerror = () => reject(request.error);
  });
}

async function deleteProduct(id){
  await initDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(PRODUCTS_STORE, 'readwrite');
    const store = tx.objectStore(PRODUCTS_STORE);
    const request = store.delete(id);
    request.onsuccess = () => resolve();
    request.onerror = () => reject(request.error);
  });
}

async function deleteMediaItem(id){
  await initDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(MEDIA_STORE, 'readwrite');
    const store = tx.objectStore(MEDIA_STORE);
    const request = store.delete(id);
    request.onsuccess = () => resolve();
    request.onerror = () => reject(request.error);
  });
}

function switchTab(tab){
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
  if(tab === 'products') renderProducts();
  if(tab === 'media') renderMedia();
}

async function saveProductForm(e){
  e.preventDefault();
  const id = document.getElementById('p_id').value || 'rec_' + Date.now();
  
  const product = {
    id,
    name: document.getElementById('p_name').value,
    category: document.getElementById('p_category').value,
    price: Number(document.getElementById('p_price').value) || 0,
    desc: document.getElementById('p_desc').value,
    year: document.getElementById('p_year').value,
    size: document.getElementById('p_size').value,
    edition: document.getElementById('p_edition').value,
    collection: document.getElementById('p_collection').value,
    tag: document.getElementById('p_tag').value,
    image: document.getElementById('p_image1').value,
    images: [
      document.getElementById('p_image1').value,
      document.getElementById('p_image2').value,
      document.getElementById('p_image3').value,
      document.getElementById('p_image4').value,
    ].filter(Boolean),
    sold: document.getElementById('p_sold').checked,
  };

  try {
    await saveProduct(product);
    showMessage('productMessage', 'Product saved! ✓', 'success');
    clearProductForm();
    renderProducts();
  } catch(err) {
    showMessage('productMessage', 'Error saving product', 'error');
  }
}

async function saveMediaItemForm(e){
  e.preventDefault();
  const id = document.getElementById('m_id').value || 'med_' + Date.now();
  
  const item = {
    id,
    fields: {
      URL: document.getElementById('m_url').value,
      Tag: document.getElementById('m_tag').value,
      Caption: document.getElementById('m_caption').value,
    }
  };

  try {
    await saveMediaItem(item);
    showMessage('mediaMessage', 'Media saved! ✓', 'success');
    clearMediaForm();
    renderMedia();
  } catch(err) {
    showMessage('mediaMessage', 'Error saving media', 'error');
  }
}

async function deleteProductItem(id){
  if(!confirm('Delete this product?')) return;
  try {
    await deleteProduct(id);
    showMessage('productMessage', 'Product deleted! ✓', 'success');
    renderProducts();
  } catch(err) {
    showMessage('productMessage', 'Error deleting product', 'error');
  }
}

async function deleteMediaItemClick(id){
  if(!confirm('Delete this media?')) return;
  try {
    await deleteMediaItem(id);
    showMessage('mediaMessage', 'Media deleted! ✓', 'success');
    renderMedia();
  } catch(err) {
    showMessage('mediaMessage', 'Error deleting media', 'error');
  }
}

async function editProductItem(id){
  const prods = await getProducts();
  const p = prods.find(x => x.id === id);
  if(!p) return;
  
  document.getElementById('p_id').value = p.id;
  document.getElementById('p_name').value = p.name;
  document.getElementById('p_category').value = p.category;
  document.getElementById('p_price').value = p.price;
  document.getElementById('p_desc').value = p.desc || '';
  document.getElementById('p_year').value = p.year || '';
  document.getElementById('p_size').value = p.size || '';
  document.getElementById('p_edition').value = p.edition || '';
  document.getElementById('p_collection').value = p.collection || '';
  document.getElementById('p_tag').value = p.tag || 'product';
  document.getElementById('p_image1').value = p.image || (p.images?.[0] || '');
  document.getElementById('p_image2').value = p.images?.[1] || '';
  document.getElementById('p_image3').value = p.images?.[2] || '';
  document.getElementById('p_image4').value = p.images?.[3] || '';
  document.getElementById('p_sold').checked = p.sold || false;
  
  window.scrollTo(0, 0);
}

async function renderProducts(){
  const prods = await getProducts();
  const html = prods.map(p => `
    <div class="product-item">
      <h3>${p.name}</h3>
      <div class="product-item-info">
        <div><strong>Category:</strong> ${p.category}</div>
        <div><strong>Price:</strong> Rs. ${p.price}</div>
        <div><strong>Collection:</strong> ${p.collection || 'N/A'}</div>
      </div>
      <div class="product-item-info">
        <div><strong>Size:</strong> ${p.size || 'N/A'}</div>
        <div><strong>Edition:</strong> ${p.edition || 'N/A'}</div>
        <div><strong>Year:</strong> ${p.year || 'N/A'}</div>
      </div>
      <div class="product-item-info">
        <div><strong>Tag:</strong> ${p.tag}</div>
        <div><strong>Sold:</strong> ${p.sold ? '✓ Yes' : 'No'}</div>
        <div><strong>Images:</strong> ${p.images?.length || 1}</div>
      </div>
      <div class="product-item-actions">
        <button class="btn-small" onclick="editProductItem('${p.id}')">Edit</button>
        <button class="btn-small btn-danger" onclick="deleteProductItem('${p.id}')">Delete</button>
      </div>
    </div>
  `).join('');
  document.getElementById('productList').innerHTML = html || '<p>No products yet.</p>';
}

async function renderMedia(){
  const media = await getMedia();
  const html = media.map(m => `
    <div class="product-item">
      <h3>${m.fields.Tag}</h3>
      <div class="product-item-info">
        <div><strong>URL:</strong> ${m.fields.URL.substring(0, 50)}...</div>
        <div><strong>Caption:</strong> ${m.fields.Caption || 'N/A'}</div>
      </div>
      <div class="product-item-actions">
        <button class="btn-small btn-danger" onclick="deleteMediaItemClick('${m.id}')">Delete</button>
      </div>
    </div>
  `).join('');
  document.getElementById('mediaList').innerHTML = html || '<p>No media yet.</p>';
}

function clearProductForm(){
  ['p_id','p_name','p_category','p_price','p_desc','p_year','p_size','p_edition','p_collection','p_tag','p_image1','p_image2','p_image3','p_image4'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.value = '';
  });
  document.getElementById('p_sold').checked = false;
}

function clearMediaForm(){
  ['m_id','m_url','m_tag','m_caption'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.value = '';
  });
}

function showMessage(id, msg, type){
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = `message ${type}`;
  setTimeout(() => el.textContent = '', 3000);
}

document.addEventListener('DOMContentLoaded', async () => {
  await initDB();
  renderProducts();
  document.getElementById('productForm').onsubmit = saveProductForm;
  document.getElementById('mediaForm').onsubmit = saveMediaItemForm;
});
</script>

</body>
</html>
